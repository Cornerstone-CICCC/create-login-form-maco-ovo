<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta http-equiv="X-UA-Compatible" content="IE=edge" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="stylesheet" href="./style.css" />
		<title>Camp-in</title>
	</head>
	<body>
		<div class="main main-image">
			<img src="images/side-image.jpg" alt="mobileImage" />
		</div>

		<div class="main main-window">
			<header>
				<img src="images/favicon.ico" alt="icon" />
				<p>camp-in</p>
			</header>

			<form id="loginForm">
				<div>
					<legend>Login</legend>
					<p>Insert your information below.</p>
				</div>

				<div class="row">
					<label>E-mail</label>
					<img src="images/mail.svg" />
					<p>Type your email</p>
				</div>

				<div class="row">
					<label>Password</label>
					<img src="images/lock.svg" />
					<p>Type your password</p>
				</div>

				<div class="row">
					<label>Remind me</label>
					<p>Forgot my password</p>
				</div>

				<div class="row">
					<label>LOGIN</label>
				</div>

				<div class="row">
					<p>Don't have an account?</p>
					<p>Sign up!</p>
				</div>
			</form>
		</div>
	</body>
</html>
